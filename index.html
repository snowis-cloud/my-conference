<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부서별 회의 일정 관리 시스템 - 클라우드 저장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = { initializeApp, getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [conferences, setConferences] = useState([]);
            const [initStatus, setInitStatus] = useState("시스템 준비 중...");
            
            const START_DATE = new Date(2026, 2, 1);
            const END_DATE = new Date(2027, 1, 28);
            const DEFAULT_TIME = '13:00';
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'teacher-conf-v1';

            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1));
            const [viewDetail, setViewDetail] = useState(null);
            const [showEndTime, setShowEndTime] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [formData, setFormData] = useState({
                title: '', date: '', startTime: DEFAULT_TIME, endTime: DEFAULT_TIME, manager: '', participants: ''
            });

            // 1단계: Firebase 초기화 및 인증
            useEffect(() => {
                let isMounted = true;
                const checkAndInit = async () => {
                    try {
                        // SDK 로딩 확인 루프
                        if (!window.FirebaseSDK) {
                            if (isMounted) setInitStatus("모듈 로드 대기 중...");
                            setTimeout(checkAndInit, 500);
                            return;
                        }

                        if (typeof __firebase_config === 'undefined') {
                            if (isMounted) setInitStatus("설정 구성 대기 중...");
                            setTimeout(checkAndInit, 500);
                            return;
                        }

                        const { initializeApp, getFirestore, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FirebaseSDK;
                        const firebaseConfig = JSON.parse(__firebase_config);
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const firestore = getFirestore(app);
                        
                        if (isMounted) {
                            setDb(firestore);
                            setInitStatus("인증 세션 연결 중...");
                        }

                        // 인증 시도
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        const unsubscribe = onAuthStateChanged(auth, (u) => {
                            if (isMounted) {
                                setUser(u);
                                if (u) setInitStatus("데이터 동기화 시작...");
                            }
                        });
                        return unsubscribe;
                    } catch (err) {
                        console.error("초기화 실패:", err);
                        if (isMounted) {
                            setError("서버 연결에 실패했습니다. (인증 오류)");
                            setLoading(false);
                        }
                    }
                };

                checkAndInit();
                return () => { isMounted = false; };
            }, []);

            // 2단계: 실시간 데이터 리스너
            useEffect(() => {
                if (!db || !user) return;

                const { collection, onSnapshot } = window.FirebaseSDK;
                const colPath = ['artifacts', appId, 'public', 'data', 'conferences'];
                const colRef = collection(db, ...colPath);
                
                const unsubscribe = onSnapshot(colRef, 
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        setConferences(data);
                        setLoading(false);
                        setError(null);
                    }, 
                    (err) => {
                        console.error("Firestore 에러:", err);
                        if (err.code === 'permission-denied') {
                            setError("접근 권한이 없습니다. 관리자에게 문의하세요.");
                        } else {
                            setError("데이터를 불러오는 중 오류가 발생했습니다.");
                        }
                        setLoading(false);
                    }
                );

                return () => unsubscribe();
            }, [db, user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [currentDate, viewDetail, showEndTime, conferences, loading, error]);

            const monthOptions = [];
            let tempDate = new Date(START_DATE);
            while (tempDate <= END_DATE) {
                monthOptions.push(new Date(tempDate));
                tempDate.setMonth(tempDate.getMonth() + 1);
            }

            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const daysInMonth = getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth());
            const firstDay = getFirstDayOfMonth(currentDate.getFullYear(), currentDate.getMonth());
            const calendarDays = [];
            for (let i = 0; i < firstDay; i++) calendarDays.push(null);
            for (let i = 1; i <= daysInMonth; i++) calendarDays.push(i);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleDateClick = (day) => {
                if (!day) return;
                const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                setViewDetail(null);
                setFormData(prev => ({ ...prev, date: dateStr }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!db || !user || !formData.title || !formData.date || isSubmitting) return;

                setIsSubmitting(true);
                const { collection, addDoc } = window.FirebaseSDK;
                
                try {
                    const docData = {
                        ...formData,
                        hasEndTime: showEndTime,
                        createdAt: Date.now(),
                        createdBy: user.uid
                    };
                    
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'conferences'), docData);
                    
                    setFormData({ title: '', date: '', startTime: DEFAULT_TIME, endTime: DEFAULT_TIME, manager: '', participants: '' });
                    setShowEndTime(false);
                } catch (err) {
                    console.error("저장 실패:", err);
                    alert("일정 저장에 실패했습니다. 권한을 확인해 주세요.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const deleteConference = async (id) => {
                if (!db || !user || !confirm("이 일정을 삭제하시겠습니까?")) return;
                const { doc, deleteDoc } = window.FirebaseSDK;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'conferences', id));
                    setViewDetail(null);
                } catch (err) {
                    console.error("삭제 실패:", err);
                    alert("삭제 권한이 없습니다.");
                }
            };

            const getConferencesForDate = (day) => {
                if (!day) return [];
                const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return conferences
                    .filter(c => c.date === dateStr)
                    .sort((a, b) => a.startTime.localeCompare(b.startTime));
            };

            if (error) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-4 text-center fade-in">
                        <Icon name="wifi-off" size={48} className="text-red-400 mb-4" />
                        <h2 className="text-lg font-bold text-slate-800 mb-2">연결 지연/오류</h2>
                        <p className="text-slate-500 text-sm mb-6 max-w-xs mx-auto">{error}</p>
                        <button onClick={() => window.location.reload()} className="px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold shadow-lg hover:bg-indigo-700 transition-colors">새로고침</button>
                    </div>
                );
            }

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 fade-in">
                        <div className="loading-spinner mb-4"></div>
                        <p className="text-slate-600 font-bold">{initStatus}</p>
                        <p className="text-slate-400 text-xs mt-3">지연이 계속되면 구글 사이트 페이지를 새로고침해 주세요.</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-2 md:p-6 fade-in">
                    <header className="max-w-6xl mx-auto mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h1 className="text-2xl font-bold text-indigo-900 flex items-center gap-2">
                                <Icon name="calendar" size={28} />
                                부서별 회의 일정 관리 (실시간)
                            </h1>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="flex h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                                <p className="text-[11px] text-slate-400 font-medium">실시간 동기화 활성 | {user?.uid.substring(0,8)}... 연결됨</p>
                            </div>
                        </div>
                        <select 
                            className="bg-white border border-slate-300 rounded-lg px-3 py-1.5 shadow-sm text-sm outline-none focus:ring-2 focus:ring-indigo-500"
                            value={`${currentDate.getFullYear()}-${currentDate.getMonth()}`}
                            onChange={(e) => {
                                const [y, m] = e.target.value.split('-').map(Number);
                                setCurrentDate(new Date(y, m, 1));
                            }}
                        >
                            {monthOptions.map((date, idx) => (
                                <option key={idx} value={`${date.getFullYear()}-${date.getMonth()}`}>
                                    {date.getFullYear()}년 {date.getMonth() + 1}월
                                </option>
                            ))}
                        </select>
                    </header>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
                            <div className="p-4 bg-indigo-600 text-white flex justify-between items-center">
                                <h2 className="font-semibold">{currentDate.getFullYear()}년 {currentDate.getMonth() + 1}월</h2>
                            </div>
                            <div className="grid grid-cols-7 text-center bg-slate-50 border-b border-slate-100">
                                {['일', '월', '화', '수', '목', '금', '토'].map((d, i) => (
                                    <div key={i} className={`py-2 text-xs font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-slate-400'}`}>{d}</div>
                                ))}
                            </div>
                            <div className="grid grid-cols-7 auto-rows-[100px] md:auto-rows-[120px]">
                                {calendarDays.map((day, idx) => {
                                    const dateConfs = getConferencesForDate(day);
                                    const dateStr = day ? `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}` : null;
                                    const isSelected = day && formData.date === dateStr;
                                    return (
                                        <div key={idx} onClick={() => handleDateClick(day)} className={`border-r border-b border-slate-50 p-1 relative cursor-pointer hover:bg-indigo-50/30 ${isSelected ? 'bg-indigo-50 ring-1 ring-inset ring-indigo-100' : ''}`}>
                                            {day && (
                                                <>
                                                    <span className={`text-xs font-medium ml-1 ${idx % 7 === 0 ? 'text-red-500' : idx % 7 === 6 ? 'text-blue-500' : 'text-slate-600'}`}>{day}</span>
                                                    <div className="mt-1 space-y-1 overflow-y-auto max-h-[70px] custom-scrollbar">
                                                        {dateConfs.map(conf => {
                                                            const isAllTeacher = conf.participants?.includes('전교사');
                                                            return (
                                                                <div 
                                                                    key={conf.id} 
                                                                    onClick={(e) => { e.stopPropagation(); setViewDetail(conf); }} 
                                                                    className={`text-[9px] p-1 rounded border truncate shadow-sm transition-colors ${
                                                                        isAllTeacher 
                                                                        ? 'bg-orange-500 text-white border-orange-600 font-bold' 
                                                                        : 'bg-indigo-50 text-indigo-700 border-indigo-100'
                                                                    }`}
                                                                >
                                                                    {isAllTeacher && <span className="mr-1">📌</span>}
                                                                    {conf.startTime} {conf.title}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="space-y-4">
                            {viewDetail ? (
                                <div className="bg-white p-5 rounded-xl shadow-md border border-indigo-100 animate-in slide-in-from-right duration-300">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-slate-800">회의 상세</h3>
                                        <button onClick={() => setViewDetail(null)} className="p-1 hover:bg-slate-100 rounded-full transition-colors"><Icon name="x" size={18} className="text-slate-400" /></button>
                                    </div>
                                    <div className="space-y-3 text-sm">
                                        <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">주제</p><p className="font-medium text-slate-700">{viewDetail.title}</p></div>
                                        <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">일시</p><p className="text-slate-700">{viewDetail.date} ({viewDetail.startTime}{viewDetail.hasEndTime ? ` ~ ${viewDetail.endTime}` : ''})</p></div>
                                        <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">담당자</p><p className="text-slate-700">{viewDetail.manager || '-'}</p></div>
                                        <div className={`p-2 rounded-lg ${viewDetail.participants?.includes('전교사') ? 'bg-orange-50 border border-orange-100' : 'bg-slate-50 border border-slate-100'}`}>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">참가자</p>
                                            <p className={viewDetail.participants?.includes('전교사') ? 'text-orange-700 font-bold' : 'text-slate-700'}>
                                                {viewDetail.participants || '-'}
                                            </p>
                                        </div>
                                    </div>
                                    <button onClick={() => deleteConference(viewDetail.id)} className="w-full mt-6 bg-red-50 text-red-600 py-2 rounded-lg text-sm font-semibold hover:bg-red-100 transition-colors">일정 삭제</button>
                                </div>
                            ) : (
                                <div className="bg-white p-5 rounded-xl shadow-md border border-slate-200">
                                    <h3 className="font-bold mb-4 flex items-center gap-2 text-slate-800"><Icon name="plus-circle" size={18} className="text-indigo-600" /> 새 회의 등록</h3>
                                    <form onSubmit={handleSubmit} className="space-y-3 text-sm">
                                        <input required name="title" value={formData.title} onChange={handleInputChange} placeholder="회의 주제를 입력하세요" className="w-full p-2.5 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" />
                                        <input required type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full p-2.5 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" />
                                        <div className="p-3 bg-slate-50 rounded-lg border border-slate-100">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-[11px] font-bold text-slate-500 uppercase">시간 설정</span>
                                                <label className="flex items-center gap-1.5 cursor-pointer group">
                                                    <span className="text-[10px] text-slate-400 group-hover:text-indigo-600 transition-colors">종료시간 추가</span>
                                                    <input type="checkbox" checked={showEndTime} onChange={(e) => setShowEndTime(e.target.checked)} className="w-3.5 h-3.5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" />
                                                </label>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="flex-1">
                                                    <p className="text-[9px] text-slate-400 mb-1 ml-1">시작</p>
                                                    <input type="time" name="startTime" value={formData.startTime} onChange={handleInputChange} className="w-full p-1.5 border border-slate-200 rounded bg-white text-xs outline-none focus:border-indigo-500" />
                                                </div>
                                                {showEndTime && (
                                                    <div className="flex-1 animate-in zoom-in duration-200">
                                                        <p className="text-[9px] text-slate-400 mb-1 ml-1">종료</p>
                                                        <input type="time" name="endTime" value={formData.endTime} onChange={handleInputChange} className="w-full p-1.5 border border-slate-200 rounded bg-white text-xs outline-none focus:border-indigo-500" />
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        <input name="manager" value={formData.manager} onChange={handleInputChange} placeholder="담당 선생님 성함" className="w-full p-2.5 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-xs transition-all" />
                                        <div className="relative">
                                            <input name="participants" value={formData.participants} onChange={handleInputChange} placeholder="참가 대상 (예: 전교사, 학년부)" className="w-full p-2.5 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 text-xs transition-all" />
                                            <button 
                                                type="button" 
                                                onClick={() => setFormData(prev => ({...prev, participants: '전교사'}))}
                                                className="absolute right-2 top-2 bg-orange-100 text-orange-600 text-[10px] px-2 py-0.5 rounded-full font-bold hover:bg-orange-200 transition-colors"
                                            >
                                                퀵:전교사
                                            </button>
                                        </div>
                                        <button 
                                            type="submit" 
                                            disabled={isSubmitting}
                                            className="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold shadow-lg shadow-indigo-200 flex justify-center items-center disabled:opacity-50 hover:bg-indigo-700 transition-all active:scale-[0.98]"
                                        >
                                            {isSubmitting ? <div className="loading-spinner" style={{width: '18px', height: '18px', borderTopColor: 'white'}}></div> : "회의 일정 등록"}
                                        </button>
                                    </form>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
